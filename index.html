<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Agent Dashboard</title>
    <style>
        :root {
            --bg-color: #0a0f0a;
            --container-bg: #141d14;
            --accent-green: #2ecc71;
            --dark-green: #1b5e20;
            --text-color: #e0e0e0;
            --border-color: #2d3e2d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .dashboard {
            background-color: var(--container-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: var(--accent-green);
            text-align: center;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-bar {
            background: rgba(46, 204, 113, 0.1);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border-left: 4px solid var(--accent-green);
        }

        textarea {
            width: 100%;
            height: 120px;
            background-color: #0d140d;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            padding: 10px;
            box-sizing: border-box;
            resize: none;
            margin-bottom: 20px;
            font-size: 1rem;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            background-color: var(--dark-green);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background-color: var(--accent-green);
            transform: translateY(-2px);
        }

        .result-container {
            margin-top: 25px;
            padding: 15px;
            background-color: #0d140d;
            border-radius: 8px;
            min-height: 50px;
            border: 1px dashed var(--border-color);
        }

        #resultArea {
            color: #a8e6cf;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .fee-info {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #888;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>Ritual Agent</h1>
        
        <div class="status-bar">
            🟢 Agent Status: Online | Network: Ritual Testnet
        </div>

        <textarea id="textInput" placeholder="Enter text to analyze or humanize..."></textarea>

        <div class="button-group">
            <button onclick="handleText('check')">AI Detector</button>
            <button onclick="handleText('humanize')">Humanize</button>
        </div>

        <div class="result-container">
            <div id="resultArea">Results will appear here...</div>
        </div>

        <div class="fee-info">
            Network Fee: <span id="feeDisplay">0.000 RTL</span>
        </div>
    </div>

    <script>
        // Ссылка на твой ngrok (проверь, чтобы она была актуальной!)
        const API_URL = "https://recipient-riverside-duckling.ngrok-free.app";

        async function handleText(action) {
            const input = document.getElementById('textInput');
            const resultArea = document.getElementById('resultArea');
            const feeDisplay = document.getElementById('feeDisplay');

            if (!input.value.trim()) {
                alert("Please enter some text!");
                return;
            }

            resultArea.innerText = "Processing request on Ritual Chain...";
            
            try {
                const response = await fetch(`${API_URL}/api/process-text`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true'
                    },
                    body: JSON.stringify({ 
                        text: input.value, 
                        action: action 
                    })
                });

                if (!response.ok) throw new Error("Agent connection failed");

                const data = await response.json();
                
                // Отображаем результат
                resultArea.innerText = data.result;
                
                // Обновляем плату за газ (RTL)
                if (data.fee) {
                    feeDisplay.innerText = data.fee;
                }

                console.log("Transaction Hash:", data.txHash);

            } catch (error) {
                console.error("Fetch Error:", error);
                resultArea.innerText = "Error: Could not connect to the Ritual Agent. Check your terminal.";
                alert("Connection failed!");
            }
        }

        console.log("✅ Ritual Dashboard successfully initialized");
    </script>
</body>
</html>
