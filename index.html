<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Architect | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap');
        :root { --neon: #ff4d00; --bg: #080808; }
        body { background-color: var(--bg); color: #e2e8f0; font-family: 'Fira Code', monospace; overflow-x: hidden; }
        .glass { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 77, 0, 0.2); border-radius: 12px; }
        .neon-border { border-color: var(--neon); box-shadow: 0 0 15px rgba(255, 77, 0, 0.1); }
        .glow-text { text-shadow: 0 0 8px var(--neon); }
        .scanline { width: 100%; height: 2px; background: rgba(255, 77, 0, 0.1); position: absolute; animation: scan 4s linear infinite; pointer-events: none; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }
    </style>
</head>
<body class="p-4 min-h-screen relative">
    <div class="scanline"></div>
    
    <div class="max-w-6xl mx-auto space-y-6 relative z-10">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center glass p-6 neon-border">
            <div>
                <div class="flex items-center gap-3">
                    <i data-lucide="cpu" class="text-orange-500 w-8 h-8"></i>
                    <h1 class="text-2xl font-bold tracking-tighter uppercase glow-text text-orange-500">Ritual Architect <span class="text-xs opacity-50">v11.1.0</span></h1>
                </div>
                <p class="text-[10px] text-gray-500 mt-1 uppercase tracking-[0.2em]">Decentralized Infrastructure Monitoring System</p>
            </div>
            <div id="status-badge" class="mt-4 md:mt-0 flex items-center gap-2 px-4 py-2 rounded-full border border-gray-800 text-xs font-bold">
                <span class="w-2 h-2 rounded-full bg-gray-500 animate-pulse"></span> OFFLINE
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="space-y-4">
                <div class="glass p-5 space-y-4">
                    <h3 class="text-xs font-bold text-gray-500 uppercase flex items-center gap-2">
                        <i data-lucide="wallet" class="w-3 h-3"></i> Assets
                    </h3>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center bg-black/40 p-2 rounded">
                            <span class="text-xs text-blue-400">ETH</span>
                            <span id="eth-bal" class="font-bold text-sm">0.0000</span>
                        </div>
                        <div class="flex justify-between items-center bg-black/40 p-2 rounded">
                            <span class="text-xs text-orange-500">RIT</span>
                            <span id="rit-bal" class="font-bold text-sm text-orange-400">0.0000</span>
                        </div>
                        <div class="flex justify-between items-center bg-black/40 p-2 rounded">
                            <span class="text-xs text-green-400">SOL</span>
                            <span id="sol-bal" class="font-bold text-sm">0.0000</span>
                        </div>
                    </div>
                </div>
                
                <div class="glass p-5">
                    <h3 class="text-xs font-bold text-gray-500 uppercase mb-3">Sync Progress</h3>
                    <div class="relative pt-1">
                        <div class="overflow-hidden h-2 mb-4 text-xs flex rounded bg-gray-800">
                            <div id="progress-bar" style="width:0%" class="shadow-none flex flex-col text-center whitespace-nowrap text-white justify-center bg-orange-600 transition-all duration-500"></div>
                        </div>
                        <div class="text-right text-[10px] text-orange-500" id="progress-text">0%</div>
                    </div>
                </div>
            </div>

            <div class="md:col-span-3 glass flex flex-col min-h-[400px]">
                <div class="p-4 border-b border-white/5 flex justify-between items-center">
                    <span class="text-xs font-bold uppercase flex items-center gap-2">
                        <i data-lucide="terminal" class="w-3 h-3 text-orange-500"></i> Terminal Output
                    </span>
                    <span class="text-[10px] text-gray-600 font-mono" id="last-ping">STABLE</span>
                </div>
                <div id="logs" class="p-4 flex-grow overflow-y-auto font-mono text-[11px] leading-relaxed space-y-1">
                    <div class="text-gray-600 italic">// Waiting for kernel initialization...</div>
                </div>
            </div>
        </div>

        <div class="glass p-4 h-32 opacity-50 hover:opacity-100 transition-opacity">
            <canvas id="activityChart"></canvas>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        // УКАЖИ СВОЙ NGROK ТУТ
        const API_URL = "https://recipient-riverside-ducklin.ngrok-free.app/api/status";

        // Инициализация маленького графика для красоты
        const ctx = document.getElementById('activityChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(20).fill(''),
                datasets: [{
                    label: 'System Load',
                    data: Array(20).fill(0).map(() => Math.random() * 100),
                    borderColor: '#ff4d00',
                    borderWidth: 1,
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: 'rgba(255, 77, 0, 0.05)',
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { x: { display: false }, y: { display: false } }
            }
        });

        async function update() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();

                // Status
                const badge = document.getElementById('status-badge');
                if(data.isRunning) {
                    badge.innerHTML = `<span class="w-2 h-2 rounded-full bg-orange-500 shadow-[0_0_8px_#ff4d00]"></span> ONLINE`;
                    badge.classList.add('text-orange-500', 'border-orange-900');
                }

                // Balances
                document.getElementById('eth-bal').innerText = data.balances.eth;
                document.getElementById('rit-bal').innerText = data.balances.rit;
                document.getElementById('sol-bal').innerText = data.balances.sol;

                // Progress
                document.getElementById('progress-bar').style.width = data.progress + "%";
                document.getElementById('progress-text').innerText = data.progress + "%";

                // Logs
                const logsDiv = document.getElementById('logs');
                logsDiv.innerHTML = data.logs.map(log => {
                    let color = log.includes('✅') || log.includes('🎓') ? 'text-green-400' : 'text-orange-200';
                    if (log.includes('❌')) color = 'text-red-500';
                    return `<div class="${color}"><span class="opacity-30 mr-2">></span> ${log}</div>`;
                }).join('');
                logsDiv.scrollTop = logsDiv.scrollHeight;

                document.getElementById('last-ping').innerText = "LATENCY: " + Math.floor(Math.random() * 50 + 20) + "ms";
                
                // Update chart
                chart.data.datasets[0].data.push(data.progress);
                chart.data.datasets[0].data.shift();
                chart.update('none');

            } catch (e) {
                document.getElementById('status-badge').innerHTML = `<span class="w-2 h-2 rounded-full bg-red-600"></span> CONNECT_ERROR`;
            }
        }

        setInterval(update, 2000);
    </script>
</body>
</html>
