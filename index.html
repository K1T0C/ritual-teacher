<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Chief Engineer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap');
        body { background-color: #0d0d0d; color: #e2e8f0; font-family: 'Fira Code', monospace; }
        .ritual-card { background: rgba(26, 26, 26, 0.8); border: 1px solid #ff4d00; box-shadow: 0 0 15px rgba(255, 77, 0, 0.2); }
        .glow-text { text-shadow: 0 0 10px #ff4d00; }
        .progress-bar { transition: width 0.5s ease; background: linear-gradient(90deg, #ff4d00, #ffae00); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b border-orange-900 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-orange-500 glow-text italic">RITUAL SUPREME SENTINEL</h1>
                <p class="text-xs text-gray-500">SYSTEM VERSION: v11.0.0 | MODE: CHIEF ENGINEER</p>
            </div>
            <div id="status-badge" class="px-4 py-1 rounded border border-gray-700 text-sm">ПОДКЛЮЧЕНИЕ...</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="ritual-card p-6 rounded-lg">
                <h2 class="text-orange-400 mb-4 font-bold border-b border-gray-800 pb-2">ФИНАНСОВЫЙ ХАБ</h2>
                <div class="space-y-3">
                    <div class="flex justify-between"><span>ETH (Sepolia):</span> <span id="eth-bal" class="text-white">0.0000</span></div>
                    <div class="flex justify-between"><span>RIT (Ritual):</span> <span id="rit-bal" class="text-orange-500">0.0000</span></div>
                    <div class="flex justify-between"><span>BAS (Base):</span> <span id="bas-bal" class="text-blue-400">0.0000</span></div>
                </div>
            </div>

            <div class="ritual-card p-6 rounded-lg md:col-span-2">
                <h2 class="text-orange-400 mb-4 font-bold border-b border-gray-800 pb-2">ПРОЦЕСС ОБУЧЕНИЯ И ДИАГНОСТИКИ</h2>
                <div class="mb-4">
                    <div class="flex justify-between mb-1 text-sm">
                        <span>Цикл синхронизации знаний</span>
                        <span id="progress-text">0%</span>
                    </div>
                    <div class="w-full bg-gray-800 h-4 rounded-full overflow-hidden border border-gray-700">
                        <div id="progress-bar" class="progress-bar h-full" style="width: 0%"></div>
                    </div>
                </div>
                <p id="current-action" class="text-sm italic text-gray-400 text-center">Ожидание команды от агента...</p>
            </div>

            <div class="ritual-card p-6 rounded-lg md:col-span-3 h-64 flex flex-col">
                <h2 class="text-orange-400 mb-2 font-bold border-b border-gray-800 pb-2">LIVE LOGS: CHIEF_ENGINEER_ACADEMY</h2>
                <div id="logs" class="overflow-y-auto flex-grow text-xs space-y-1 text-green-500 font-mono">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // ТУТ ВАЖНО: Замени на свою ссылку от Ngrok позже!
        const API_URL = "http://localhost:3000/api/status";

        async function updateDashboard() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                // Статус
                const badge = document.getElementById('status-badge');
                if(data.isRunning) {
                    badge.innerText = "🚀 ACTIVE";
                    badge.className = "px-4 py-1 rounded border border-orange-500 text-orange-500 text-sm glow-text";
                } else {
                    badge.innerText = "🛑 IDLE";
                    badge.className = "px-4 py-1 rounded border border-gray-700 text-gray-500 text-sm";
                }

                // Балансы
                document.getElementById('eth-bal').innerText = data.balances.eth;
                document.getElementById('rit-bal').innerText = data.balances.rit;
                document.getElementById('bas-bal').innerText = data.balances.bas;

                // Прогресс
                document.getElementById('progress-bar').style.width = data.progress + "%";
                document.getElementById('progress-text').innerText = data.progress + "%";

                // Логи
                const logsDiv = document.getElementById('logs');
                logsDiv.innerHTML = data.logs.map(log => `<div>[${new Date().toLocaleTimeString()}] ${log}</div>`).join('');
                logsDiv.scrollTop = logsDiv.scrollHeight;

            } catch (error) {
                document.getElementById('status-badge').innerText = "❌ ОФФЛАЙН";
                document.getElementById('status-badge').className = "px-4 py-1 rounded border border-red-500 text-red-500 text-sm";
            }
        }

        setInterval(updateDashboard, 2000);
    </script>
</body>
</html>
