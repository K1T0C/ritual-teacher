<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual AI | Text Mentor</title>
    <!-- Подключаем стильный шрифт и Bootstrap -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: #141417;
            --primary-accent: #6366f1; /* Индиго */
            --secondary-accent: #10b981; /* Изумрудный */
            --text-main: #f8fafc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .mentor-card {
            background: var(--card-bg);
            border: 1px solid #27272a;
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 { font-weight: 800; letter-spacing: -0.025em; margin-bottom: 1.5rem; }

        .text-area-custom {
            background: #1c1c21 !important;
            border: 1px solid #3f3f46 !important;
            color: #fff !important;
            border-radius: 16px;
            padding: 1.2rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            resize: none;
        }

        .text-area-custom:focus {
            border-color: var(--primary-accent) !important;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2) !important;
        }

        .btn-action {
            border-radius: 12px;
            padding: 0.8rem 1.5rem;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn-action:active { transform: scale(0.98); }

        .btn-check { background: transparent; border: 2px solid var(--secondary-accent); color: var(--secondary-accent); }
        .btn-check:hover { background: var(--secondary-accent); color: #fff; }

        .btn-humanize { background: var(--primary-accent); border: none; color: #fff; }
        .btn-humanize:hover { background: #4f46e5; box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }

        #resultBlock {
            margin-top: 2rem;
            animation: fadeIn 0.5s ease;
        }

        .output-box {
            background: #000;
            border-radius: 16px;
            padding: 1.5rem;
            border-left: 4px solid var(--primary-accent);
            font-size: 0.95rem;
            line-height: 1.6;
            color: #cbd5e1;
            white-space: pre-wrap;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader { width: 20px; height: 20px; border: 3px solid #fff; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="mentor-card">
                <div class="d-flex align-items-center mb-4">
                    <div style="background: var(--primary-accent); width: 12px; height: 32px; border-radius: 4px; margin-right: 15px;"></div>
                    <h2 class="m-0">Ritual Text Mentor</h2>
                </div>

                <textarea id="inputText" class="form-control text-area-custom mb-4" rows="10" placeholder="Вставьте ваш текст для анализа или очеловечивания..."></textarea>

                <div class="row g-3">
                    <div class="col-md-6">
                        <button id="btnCheck" onclick="handleAction('check')" class="btn btn-action btn-check w-100">
                            <span id="loadCheck" class="loader hidden"></span>
                            🔍 Проверить на ИИ
                        </button>
                    </div>
                    <div class="col-md-6">
                        <button id="btnHuman" onclick="handleAction('humanize')" class="btn btn-action btn-humanize w-100">
                            <span id="loadHuman" class="loader hidden"></span>
                            ✨ Очеловечить текст
                        </button>
                    </div>
                </div>

                <!-- Блок результата -->
                <div id="resultBlock" class="hidden">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <label class="text-secondary small fw-bold">ВЕРДИКТ ОРАКУЛА</label>
                        <button onclick="copyResult()" class="btn btn-sm btn-link text-decoration-none p-0" style="color: var(--primary-accent);">Копировать</button>
                    </div>
                    <div id="output" class="output-box"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ЗАМЕНИ НА СВОЙ АДРЕС NGROK
    const API_BASE = "https://ТВОЙ-АДРЕС.ngrok-free.app/api/process-text";

    async function handleAction(action) {
        const text = document.getElementById('inputText').value;
        const btnCheck = document.getElementById('btnCheck');
        const btnHuman = document.getElementById('btnHuman');
        const loadCheck = document.getElementById('loadCheck');
        const loadHuman = document.getElementById('loadHuman');
        const resultBlock = document.getElementById('resultBlock');
        const output = document.getElementById('output');

        if (!text || text.length < 5) {
            alert("Пожалуйста, введите текст подлиннее.");
            return;
        }

        // Индикация загрузки
        const isCheck = action === 'check';
        if (isCheck) { loadCheck.classList.remove('hidden'); btnCheck.disabled = true; }
        else { loadHuman.classList.remove('hidden'); btnHuman.disabled = true; }

        try {
            const response = await fetch(API_BASE, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'ngrok-skip-browser-warning': 'true' // Убирает страницу заглушку ngrok
                },
                body: JSON.stringify({ text, action })
            });

            const data = await response.json();

            if (data.success) {
                output.innerText = data.result;
                resultBlock.classList.remove('hidden');
                // Прокрутка к результату
                resultBlock.scrollIntoView({ behavior: 'smooth' });
            } else {
                alert("Ошибка Агента: " + data.error);
            }
        } catch (err) {
            console.error(err);
            alert("Не удалось связаться с Агентом. Проверьте ngrok и сервер.");
        } finally {
            // Снимаем загрузку
            loadCheck.classList.add('hidden');
            loadHuman.classList.add('hidden');
            btnCheck.disabled = false;
            btnHuman.disabled = false;
        }
    }

    function copyResult() {
        const text = document.getElementById('output').innerText;
        navigator.clipboard.writeText(text);
        alert("Текст скопирован!");
    }
</script>

</body>
</html>
