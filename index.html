<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RITUAL | TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Space Mono', monospace;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .cyber-card {
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid #333;
            position: relative;
            transition: all 0.3s ease;
        }

        .cyber-card:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .status-glitch {
            text-shadow: 2px 2px var(--neon-purple);
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            2% { transform: translate(-2px, 2px); }
            4% { transform: translate(2px, -2px); }
            6% { transform: translate(0); }
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));
            box-shadow: 0 0 10px var(--neon-blue);
            transition: width 1s ease-in-out;
        }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <!-- TOP NAV -->
        <div class="flex justify-between items-center border-b border-zinc-800 pb-4 mb-8">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-zinc-900 border border-zinc-700 flex items-center justify-center font-bold text-cyan-400">R</div>
                <div>
                    <h1 class="text-xl font-bold tracking-tighter uppercase status-glitch">Ritual Node Operator</h1>
                    <p class="text-[10px] text-zinc-500 font-mono">ENCRYPTED_STREAM_V2.4</p>
                </div>
            </div>
            <div class="text-right">
                <div id="status-container" class="flex items-center gap-2 px-3 py-1 bg-zinc-900 border border-zinc-800 rounded">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-red-600"></div>
                    <span id="status-text" class="text-[10px] uppercase text-zinc-400">Offline</span>
                </div>
            </div>
        </div>

        <!-- MAIN DATA -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="cyber-card p-4 col-span-2">
                <p class="text-zinc-500 text-[10px] uppercase mb-1">Available Liquidity</p>
                <div class="text-4xl font-bold text-cyan-400"><span id="eth-balance">0.000</span> <span class="text-lg text-zinc-600">ETH</span></div>
            </div>
            <div class="cyber-card p-4">
                <p class="text-zinc-500 text-[10px] uppercase mb-1">Staked Assets</p>
                <div class="text-2xl font-bold text-purple-500"><span id="ritual-balance">0.0</span> <span class="text-sm">RIT</span></div>
            </div>
            <div class="cyber-card p-4">
                <p class="text-zinc-500 text-[10px] uppercase mb-1">Last Update</p>
                <div id="last-update" class="text-xl font-bold text-zinc-300">--:--:--</div>
            </div>
        </div>

        <!-- CONSOLE -->
        <div class="cyber-card rounded-none overflow-hidden">
            <div class="bg-zinc-900 px-4 py-1 text-[10px] text-zinc-500 border-b border-zinc-800 uppercase flex justify-between">
                <span>System Console</span>
                <span class="animate-pulse">● Live Recording</span>
            </div>
            <div id="console" class="h-64 p-4 overflow-y-auto font-mono text-[11px] text-cyan-500/80 space-y-1">
                <p>> Initializing ritual link...</p>
            </div>
        </div>

        <div class="mt-4 flex gap-4 text-[9px] text-zinc-600 uppercase">
            <span>Network: Holesky-Test</span>
            <span>Uptime: <span id="uptime-counter">0s</span></span>
            <span class="ml-auto">Protocol: Ritual-SDK-v1</span>
        </div>
    </div>

    <script>
        const API_URL = "https://recipient-riverside-duckling.ngrok-free.dev/api/status";
        let startTime = Date.now();

        function log(msg) {
            const c = document.getElementById('console');
            const p = document.createElement('p');
            p.innerHTML = `<span class="text-zinc-700">[${new Date().toLocaleTimeString()}]</span> > ${msg}`;
            c.appendChild(p);
            c.scrollTop = c.scrollHeight;
        }

        async function refresh() {
            try {
                const res = await fetch(API_URL, { headers: { 'ngrok-skip-browser-warning': '69420' } });
                const data = await res.json();
                
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-cyan-400 shadow-[0_0_8px_#00f3ff]";
                document.getElementById('status-text').innerText = "Online";
                document.getElementById('status-text').className = "text-[10px] uppercase text-cyan-400";
                
                document.getElementById('eth-balance').innerText = data.balances.eth;
                document.getElementById('ritual-balance').innerText = data.balances.ritual || '0';
                document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
                
                log("Data synchronization complete.");
            } catch (e) {
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-red-600";
                document.getElementById('status-text').innerText = "Offline";
                log("Connection error: Retrying...");
            }
            
            document.getElementById('uptime-counter').innerText = Math.floor((Date.now() - startTime)/1000) + "s";
        }

        setInterval(refresh, 5000);
        refresh();
    </script>
</body>
</html>
