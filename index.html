<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual AI Agent Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background: #050a08; /* Глубокий зеленый */
            color: #ecfdf5;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
        }
        .brand-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            background: linear-gradient(45deg, #10b981, #34d399); /* Изумрудный градиент */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .cyber-card {
            background: rgba(13, 21, 18, 0.9);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.05);
            transition: all 0.3s ease;
        }
        .cyber-card:hover {
            border-color: rgba(16, 185, 129, 0.6);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.2);
            transform: translateY(-2px);
        }
        .btn-cyber {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #050a08;
            font-weight: 700;
            border: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-cyber:hover {
            box-shadow: 0 0 15px #10b981;
            color: #fff;
        }
        .text-neon {
            color: #10b981;
            text-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
        }

        /* Кнопка TRAIN YOUR AGENT */
        .train-portal {
            margin-top: 3rem;
            height: 280px;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border: 2px solid #10b981;
            background: linear-gradient(rgba(5, 10, 8, 0.7), rgba(5, 10, 8, 0.8)), 
                        url('https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&w=2832&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            transition: 0.4s;
        }
        .train-portal:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.3);
        }
        .train-portal h1 {
            font-family: 'Orbitron';
            color: #fff;
            font-weight: 800;
            font-size: 3.5rem;
            text-shadow: 0 0 20px #10b981;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-5 border-bottom border-success pb-4">
        <div>
            <h1 class="brand-title mb-1"><i class="fa-solid fa-microchip-ai"></i> RITUAL AGENT HUB</h1>
            <p class="text-secondary mb-0">Decentralized AI Text Processing & Academy Oracle</p>
        </div>
        <button id="connectWalletBtn" class="btn btn-outline-success btn-lg px-4" onclick="connectWallet()">
            <i class="fa-solid fa-wallet me-2"></i> Connect MetaMask
        </button>
    </div>

    <div id="walletInfo" class="alert d-none mb-4 bg-dark text-success border-success" style="border-style: dashed;">
        <i class="fa-solid fa-circle-check"></i> Connected Wallet: <strong id="walletAddress">0x</strong>
    </div>

    <div class="row g-4">
        <div class="col-lg-6">
            <h3 class="text-neon mb-3"><i class="fa-solid fa-gears"></i> Core Inference</h3>
            
            <!-- AI Detector -->
            <div class="cyber-card p-4 mb-4">
                <h5 class="text-success"><i class="fa-solid fa-brain"></i> AI Detector Oracle</h5>
                <textarea id="checkTextInput" class="form-control bg-dark text-white border-secondary mb-3" rows="4" placeholder="Paste text for AI scan..."></textarea>
                <button class="btn btn-cyber w-100" onclick="handleText('check')"><i class="fa-solid fa-bolt"></i> Run Detector</button>
                <div id="checkResult" class="mt-3 text-white small"></div>
            </div>

            <!-- Humanizer -->
            <div class="cyber-card p-4">
                <h5 class="text-success"><i class="fa-solid fa-feather-pointed"></i> Text Humanizer</h5>
                <textarea id="humanizeTextInput" class="form-control bg-dark text-white border-secondary mb-3" rows="4" placeholder="Enter text to rewrite..."></textarea>
                <button class="btn btn-cyber w-100" onclick="handleText('humanize')"><i class="fa-solid fa-wand-magic-sparkles"></i> Humanize Text</button>
                <div id="humanizeResult" class="mt-3 text-white small"></div>
            </div>
        </div>

        <div class="col-lg-6">
            <h3 class="text-neon mb-3"><i class="fa-solid fa-terminal"></i> Terminal Logs</h3>
            <div class="cyber-card p-4 h-100" style="background: #000; min-height: 450px;">
                <div id="terminalLog" class="text-success small font-monospace">
                    > Ritual Node initialized...<br>
                    > Awaiting inference request...
                </div>
            </div>
        </div>
    </div>

    <!-- THE BIG PORTAL BUTTON -->
    <a href="academy.html" class="train-portal">
        <h1>TRAIN YOUR AGENT</h1>
    </a>
</div>

<script>
    // Замени на свою ссылку ngrok
    const API_URL = "http://127.0.0.1:4040";

    async function connectWallet() {
        if (!window.ethereum) return alert("MetaMask not found!");
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        document.getElementById('walletInfo').classList.remove('d-none');
        document.getElementById('walletAddress').innerText = accounts[0];
        document.getElementById('connectWalletBtn').innerText = "Wallet Connected";
    }

    async function handleText(action) {
        const text = action === 'check' ? document.getElementById('checkTextInput').value : document.getElementById('humanizeTextInput').value;
        const resultDiv = action === 'check' ? document.getElementById('checkResult') : document.getElementById('humanizeResult');
        
        if (!text) return;
        resultDiv.innerHTML = "Processing Inference...";
        
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                body: JSON.stringify({ text, action })
            });
            const data = await response.json();
            resultDiv.innerHTML = data.result;
            document.getElementById('terminalLog').innerHTML += `<br>> ${action.toUpperCase()} complete.`;
        } catch (e) { resultDiv.innerHTML = "Error: Connection failed"; }
    }
</script>
</body>
</html>
