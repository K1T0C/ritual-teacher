<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Architect | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fira Code', monospace;
            background-color: #0a0a0c;
            color: #00ff9d;
        }
        .neo-card {
            background: rgba(16, 16, 20, 0.8);
            border: 1px solid #1f2937;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.05);
        }
        .status-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
        .progress-bar {
            transition: width 0.5s ease-in-out;
            background: linear-gradient(90deg, #00ff9d, #008cff);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tighter uppercase">Ritual <span class="text-white">Architect</span></h1>
                <p class="text-xs text-gray-500 mt-1">v11.1.0 // Infrastructure Monitor</p>
            </div>
            <div id="status-badge" class="px-3 py-1 rounded border border-gray-700 text-xs flex items-center gap-2 bg-gray-900">
                <div class="w-2 h-2 rounded-full bg-red-500"></div>
                <span class="text-gray-400 font-bold uppercase tracking-widest">Offline</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Balances -->
            <div class="neo-card p-6 rounded-lg">
                <h3 class="text-gray-500 text-xs mb-4 uppercase tracking-widest font-bold">Node Assets</h3>
                <div id="balances" class="space-y-4">
                    <div class="flex justify-between border-b border-gray-900 pb-2">
                        <span class="text-white">SOL</span><span id="sol-val">0.00</span>
                    </div>
                    <div class="flex justify-between border-b border-gray-900 pb-2 text-[#00ff9d]">
                        <span>RIT</span><span id="rit-val">0.00</span>
                    </div>
                    <div class="flex justify-between border-b border-gray-900 pb-2">
                        <span class="text-white">ETH</span><span id="eth-val">0.00</span>
                    </div>
                </div>
            </div>

            <!-- Progress -->
            <div class="neo-card p-6 rounded-lg md:col-span-2">
                <h3 class="text-gray-500 text-xs mb-4 uppercase tracking-widest font-bold">Inference Training Progress</h3>
                <div class="flex justify-between mb-2 text-sm">
                    <span id="task-name">Current Skill: Infra-Tutor</span>
                    <span id="progress-text">0%</span>
                </div>
                <div class="w-full bg-gray-800 h-4 rounded-full overflow-hidden border border-gray-700">
                    <div id="progress-bar" class="progress-bar h-full w-0"></div>
                </div>
                <div class="mt-6 grid grid-cols-2 gap-4">
                    <div class="bg-black/50 p-3 rounded">
                        <p class="text-[10px] text-gray-500 uppercase">System Uptime</p>
                        <p class="text-lg text-white font-bold tracking-tighter">04:12:00:23</p>
                    </div>
                    <div class="bg-black/50 p-3 rounded">
                        <p class="text-[10px] text-gray-500 uppercase">Network Latency</p>
                        <p id="latency" class="text-lg text-white font-bold tracking-tighter">-- ms</p>
                    </div>
                </div>
            </div>

            <!-- Logs -->
            <div class="neo-card p-6 rounded-lg md:col-span-3">
                <h3 class="text-gray-500 text-xs mb-4 uppercase tracking-widest font-bold">Live System Logs</h3>
                <div id="logs-container" class="space-y-2 text-xs font-mono max-h-48 overflow-y-auto">
                    <div class="text-gray-600 italic">Waiting for incoming data stream...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === ВСТАВЬ СВОЮ АКТУАЛЬНУЮ ССЫЛКУ NGROK НИЖЕ ===
        const API_URL = "https://recipient-riverside-ducklin.ngrok-free.app/api/status";

        async function updateStatus() {
            const startTime = Date.now();
            try {
                // Добавляем заголовок, который отключает предупреждение Ngrok
                const response = await fetch(API_URL, {
    method: 'GET',
    headers: {
        // Это заставит Ngrok пропустить запрос мимо страницы с предупреждением
        'ngrok-skip-browser-warning': '69420', 
        'Accept': 'application/json'
    }
});

                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                const latency = Date.now() - startTime;

                // Обновляем статус бейджа
                const badge = document.getElementById('status-badge');
                if (data.isRunning) {
                    badge.innerHTML = `<div class="w-2 h-2 rounded-full bg-[#00ff9d] status-pulse"></div><span class="text-[#00ff9d] font-bold uppercase tracking-widest">🚀 Online</span>`;
                } else {
                    badge.innerHTML = `<div class="w-2 h-2 rounded-full bg-orange-500"></div><span class="text-orange-500 font-bold uppercase tracking-widest">Idle</span>`;
                }

                // Обновляем балансы
                document.getElementById('sol-val').innerText = data.balances.sol;
                document.getElementById('rit-val').innerText = data.balances.rit;
                document.getElementById('eth-val').innerText = data.balances.eth;
                document.getElementById('latency').innerText = `${latency} ms`;

                // Обновляем прогресс
                document.getElementById('progress-bar').style.width = `${data.progress}%`;
                document.getElementById('progress-text').innerText = `${data.progress}%`;

                // Обновляем логи
                const logsContainer = document.getElementById('logs-container');
                logsContainer.innerHTML = data.logs.map(log => 
                    `<div class="border-l-2 border-gray-800 pl-3 py-1"><span class="text-gray-500">[${new Date().toLocaleTimeString()}]</span> <span class="text-gray-300">${log}</span></div>`
                ).join('');

            } catch (error) {
                console.error("Fetch error:", error);
                const badge = document.getElementById('status-badge');
                badge.innerHTML = `<div class="w-2 h-2 rounded-full bg-red-600"></div><span class="text-red-600 font-bold uppercase tracking-widest">Error Connection</span>`;
            }
        }

        // Запуск цикла обновления (каждые 2 секунды)
        setInterval(updateStatus, 2000);
        updateStatus(); // Первый запуск сразу
    </script>
</body>
</html>
