<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Agent Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .online { background-color: #4ade80; box-shadow: 0 0 10px #4ade80; }
        .offline { background-color: #f87171; box-shadow: 0 0 10px #f87171; }
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-12 border-b border-slate-700 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">Ritual Agent <span class="text-slate-500 text-lg font-normal">v1.0</span></h1>
                <p class="text-slate-400 mt-1">Blockchain AI Infrastructure</p>
            </div>
            <div class="text-right">
                <div class="flex items-center justify-end">
                    <span id="status-dot" class="status-dot offline"></span>
                    <span id="status-text" class="text-red-400 font-mono">System Offline</span>
                </div>
                <p class="text-xs text-slate-500 mt-1 italic">Last update: <span id="last-update">-</span></p>
            </div>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Wallet Card -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h2 class="text-slate-400 text-sm font-semibold uppercase tracking-wider mb-4">Node Balance</h2>
                <div class="flex items-end space-x-2">
                    <span id="eth-balance" class="text-4xl font-mono">0.0000</span>
                    <span class="text-slate-500 mb-1">ETH</span>
                </div>
            </div>

            <!-- Ritual Info -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h2 class="text-slate-400 text-sm font-semibold uppercase tracking-wider mb-4">Ritual Network</h2>
                <div class="space-y-2">
                    <div class="flex justify-between">
                        <span class="text-slate-500">Chain:</span>
                        <span class="text-blue-300">Holesky Testnet</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-slate-500">Agent Role:</span>
                        <span class="text-blue-300">Inference Node</span>
                    </div>
                </div>
            </div>
        </main>

        <footer class="mt-12 text-center text-slate-600 text-sm">
            <p>Connected via Secure Ngrok Tunnel</p>
        </footer>
    </div>

    <script>
        // ТУТ ЗАМЕНИ НА СВОЙ АДРЕС ИЗ ТЕРМИНАЛА NGROK
        const API_URL = "https://recipient-riverside-duckling.ngrok-free.dev/api/status";

        async function updateStatus() {
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const lastUpdate = document.getElementById('last-update');
            const ethBalance = document.getElementById('eth-balance');

            try {
                const response = await fetch(API_URL, {
                    method: 'GET',
                    headers: {
                        'ngrok-skip-browser-warning': 'true',
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) throw new Error('Server not responding');

                const data = await response.json();

                // Обновление интерфейса при успехе
                statusDot.className = 'status-dot online';
                statusText.innerText = 'System Online';
                statusText.className = 'text-green-400 font-mono';
                lastUpdate.innerText = new Date().toLocaleTimeString();
                
                if (data.balances && data.balances.eth) {
                    ethBalance.innerText = parseFloat(data.balances.eth).toFixed(4);
                }

            } catch (error) {
                console.error("Fetch Error:", error);
                statusDot.className = 'status-dot offline';
                statusText.innerText = 'System Offline';
                statusText.className = 'text-red-400 font-mono';
            }
        }

        // Запуск обновления каждые 5 секунд
        setInterval(updateStatus, 5000);
        // Первый запуск сразу
        updateStatus();
    </script>
</body>
</html>
