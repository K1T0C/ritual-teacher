<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual | AI Inference Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050a08;
            --emerald-glow: #10b981;
            --emerald-dark: #064e3b;
            --card-bg: rgba(13, 21, 18, 0.9);
            --border-color: #1a2e26;
        }

        body {
            background-color: var(--bg-deep);
            color: #ecfdf5;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        /* Ritual Navigation */
        .navbar {
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 5%;
            backdrop-filter: blur(10px);
        }

        .ritual-logo { font-weight: 800; font-size: 1.4rem; letter-spacing: -1px; color: var(--emerald-glow); text-transform: uppercase; }

        .btn-wallet {
            background: transparent;
            border: 1px solid var(--emerald-glow);
            color: var(--emerald-glow);
            border-radius: 8px;
            padding: 0.6rem 1.4rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-wallet:hover { background: var(--emerald-glow); color: #000; box-shadow: 0 0 15px var(--emerald-glow); }

        /* Interface Container */
        .hero-section { padding: 5rem 0 2rem 0; text-align: center; }
        
        .main-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .tool-input {
            background: #08100d !important;
            border: 1px solid var(--border-color) !important;
            color: #fff !important;
            border-radius: 16px;
            padding: 1.2rem;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .tool-input:focus { border-color: var(--emerald-glow) !important; box-shadow: none; }

        /* Buttons Style */
        .btn-ritual {
            border-radius: 12px;
            padding: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.4s;
        }

        .btn-detect { border: 1px solid var(--emerald-glow); color: var(--emerald-glow); background: transparent; }
        .btn-detect:hover { background: rgba(16, 185, 129, 0.1); }

        .btn-human { background: var(--emerald-glow); color: #000; border: none; }
        .btn-human:hover { background: #34d399; transform: translateY(-2px); }

        /* THE "TRAIN YOUR AGENT" PORTAL BUTTON */
        .train-portal-btn {
            margin-top: 4rem;
            position: relative;
            height: 300px;
            border-radius: 30px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border: 1px solid var(--border-color);
            /* Фон - абстрактная нейросеть/код */
            background: linear-gradient(rgba(5, 10, 8, 0.6), rgba(5, 10, 8, 0.9)), 
                        url('https://images.unsplash.com/photo-1620712943543-bcc4628c9757?q=80&w=1964&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            transition: 0.5s all ease;
        }

        .train-portal-btn:hover {
            border-color: var(--emerald-glow);
            transform: scale(1.01);
            filter: brightness(1.2);
        }

        .train-portal-btn h1 {
            color: #fff;
            font-weight: 800;
            font-size: 3.5rem;
            text-shadow: 0 0 30px rgba(16, 185, 129, 0.6);
            z-index: 2;
            letter-spacing: -2px;
        }

        #result-display {
            margin-top: 2rem;
            padding: 2rem;
            background: #020504;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            display: none;
        }
    </style>
</head>
<body>

<nav class="navbar d-flex justify-content-between align-items-center">
    <div class="ritual-logo">ritual.network</div>
    <button class="btn-wallet" id="connectButton" onclick="connectWallet()">CONNECT WALLET</button>
</nav>

<div class="container">
    <div class="hero-section">
        <h1 class="display-4 fw-bold">Infer Your Agent</h1>
        <p class="text-secondary opacity-75">Access decentralized compute for AI text verification and humanization</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="main-card">
                <textarea id="inputText" class="form-control tool-input mb-4" rows="8" placeholder="Paste your content here..."></textarea>
                
                <div class="row g-4">
                    <div class="col-md-6">
                        <button onclick="process('check')" class="btn btn-ritual btn-detect w-100">AI Detector Scan</button>
                    </div>
                    <div class="col-md-6">
                        <button onclick="process('humanize')" class="btn btn-ritual btn-human w-100">Humanize Content</button>
                    </div>
                </div>

                <div id="result-display">
                    <div class="small text-uppercase text-secondary fw-bold mb-2">Inference Result</div>
                    <div id="outputText" class="text-light" style="white-space: pre-wrap;"></div>
                </div>
            </div>

            <!-- BIG ACTIVE BUTTON -->
            <a href="skills.html" class="train-portal-btn">
                <h1>TRAIN YOUR AGENT</h1>
            </a>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://ТВОЙ-NGROK.ngrok-free.app/api/process-text";

    async function connectWallet() {
        if (window.ethereum) {
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('connectButton').innerText = accounts[0].slice(0,6) + '...' + accounts[0].slice(-4);
            } catch (e) { console.error("User rejected"); }
        } else {
            alert("Please install MetaMask!");
        }
    }

    async function process(action) {
        const text = document.getElementById('inputText').value;
        const display = document.getElementById('result-display');
        const outputText = document.getElementById('outputText');

        if(!text) return alert("Input text is empty!");

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                body: JSON.stringify({ text, action })
            });
            const data = await res.json();
            outputText.innerText = data.result;
            display.style.display = 'block';
            display.scrollIntoView({ behavior: 'smooth' });
        } catch (e) { alert("Inference Node Error"); }
    }
</script>
</body>
</html>
